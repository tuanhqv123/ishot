<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>iShot · Scroll capture</title>
    <style>
      :root {
        --bg: rgba(28, 28, 30, 0.85);
        --radius: 14px;
        --text: #ffffff;
        --text-dim: rgba(255, 255, 255, 0.55);
        --warn: #ffcc00;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: transparent !important;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        color: var(--text);
      }
      body {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        padding: 12px;
      }
      /* Panel itself is fully transparent — no background, no border, no
         shadow. Only the preview image and the Esc hint are visible, floating
         freely over whatever's behind the panel window. */
      .panel {
        position: relative;
        width: 220px;
        padding: 0;
      }
      /* Just the captured image — no fixed-height box, no surrounding frame.
         It grows to its natural height as the stitch builds. */
      .preview-img {
        display: none;
        width: 220px;
        border-radius: 8px;
        pointer-events: none;
        -webkit-user-drag: none;
        user-select: none;
      }
      .preview-img.show { display: block; }
      /* Placeholder message, shown only before the first frame arrives.
         Plain floating text — no pill/box behind it; the text-shadow alone
         keeps it readable over any background. */
      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.45;
        color: var(--text);
        padding: 14px 18px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.85);
        transition: opacity 200ms ease;
      }
      .placeholder.hidden { display: none; }
      .placeholder .icon { display: block; margin-bottom: 8px; font-size: 22px; line-height: 1; }
      .placeholder.warn { color: var(--warn); }
      /* Plain-text Esc hint under the preview image — no box, no frame.
         Hidden until the first frame arrives (the placeholder covers it
         before that). */
      .esc-hint {
        display: none;
        margin-top: 6px;
        text-align: center;
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      }
      .esc-hint.show { display: block; }
    </style>
  </head>
  <body>
    <div class="panel">
      <img id="thumb" class="preview-img" alt="" draggable="false" />
      <div class="esc-hint" id="escHint">Press Esc to finish</div>
      <div class="placeholder" id="msg">
        <div>Scroll down or right, steadily</div>
      </div>
    </div>

    <script>
      const T = window.__TAURI__;
      let cleaned = false;
      let warnTimer = null;
      let gotFirstFrame = false;

      const msgEl = document.getElementById("msg");
      const thumbEl = document.getElementById("thumb");

      function setMessage(html, kind) {
        msgEl.innerHTML = html;
        msgEl.classList.toggle("warn", kind === "warn");
        msgEl.classList.remove("hidden");
      }
      function hideMessage() {
        msgEl.classList.add("hidden");
      }

      function cleanup() {
        if (cleaned) return;
        cleaned = true;
        T.event.emit("scroll-capture-done");
        T.window.getCurrentWindow().close();
      }

      // FINISH = stop capture + copy result to clipboard.
      async function finish() {
        try {
          const r = await T.core.invoke("finalize_scroll_to_clipboard");
          if (r) new Notification("iShot", { body: `Saved ${r.width}×${r.height}` });
        } catch (e) {
          console.error(e);
        } finally {
          T.core.invoke("hide_scroll_border").catch(() => {});
          cleanup();
        }
      }

      // Pre-capture hints, one at a time: the scroll hint for the first 3s,
      // then "Press Esc to finish" — once, no looping. Stops at the first frame.
      const HINTS = ["Scroll down or right, steadily", "Press Esc to finish"];
      let hintIdx = 0;
      let permMsg = false; // a permission message owns the panel — don't overwrite
      setTimeout(() => {
        if (gotFirstFrame || permMsg || msgEl.classList.contains("warn")) return;
        hintIdx = 1;
        msgEl.style.opacity = "0";
        setTimeout(() => {
          if (gotFirstFrame || permMsg) return;
          msgEl.innerHTML = "<div>" + HINTS[1] + "</div>";
          msgEl.style.opacity = "1";
        }, 200);
      }, 3000);

      // Backend ended the session because Input Monitoring is missing or its
      // TCC entry is stale. System Settings has already been opened at the
      // right pane — explain what to flip and how to come back.
      T.event.listen("scroll-capture-permission", (ev) => {
        permMsg = true;
        const stale = ev.payload === "stale-input-monitoring";
        const txt = stale
          ? "Permission needs a refresh:<br>remove &amp; re-add iShot under<br>Input Monitoring, then relaunch"
          : "Turn on Input Monitoring<br>for iShot in System Settings,<br>then relaunch iShot";
        setMessage("<div>" + txt + "</div>", "warn");
        thumbEl.classList.remove("show");
        document.getElementById("escHint").classList.remove("show");
        // Drop the dim/border overlay right away — the user is about to work
        // in System Settings and shouldn't have a dimmed screen in the way.
        T.core.invoke("hide_scroll_border").catch(() => {});
      });

      // Esc anywhere = finish (Shottr-style). No buttons, no status row,
      // no frame count — just the preview + this one keystroke.
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          e.preventDefault();
          finish();
        }
      });
      // Esc pressed while ANOTHER window has focus (user clicked into the page
      // they're scrolling): the webview keydown above never fires, so Rust
      // registers a global Esc shortcut for the session and relays it here.
      T.event.listen("scroll-esc", () => finish());

      T.event.listen("scroll-capture-progress", (ev) => {
        const p = ev.payload;
        if (p.thumbnail) {
          thumbEl.src = "data:image/jpeg;base64," + p.thumbnail;
          if (!gotFirstFrame) {
            gotFirstFrame = true;
            thumbEl.classList.add("show");
            document.getElementById("escHint").classList.add("show");
            hideMessage();
          }
        }
      });

      T.event.listen("scroll-capture-warning", (ev) => {
        if (ev.payload === "scroll-too-fast") {
          setMessage(
            '<div><span class="icon">⚠</span>Scroll slower<br>for clean stitching</div>',
            "warn"
          );
          if (warnTimer) clearTimeout(warnTimer);
          warnTimer = setTimeout(() => {
            if (gotFirstFrame) {
              hideMessage();
            } else {
              // Back to the rotating hints (don't stay stuck on the warning).
              msgEl.classList.remove("warn");
              msgEl.innerHTML = "<div>" + HINTS[hintIdx] + "</div>";
            }
          }, 2200);
        }
      });

      T.event.listen("scroll-capture-result", (ev) => {
        if (cleaned) return;
        const d = ev.payload || {};
        if (d.width && d.height) {
          new Notification("iShot", { body: `Saved ${d.width}×${d.height}` });
        }
        cleanup();
      });

      T.event.listen("scroll-capture-error", () => {
        if (cleaned) return;
        cleanup();
      });
    </script>
  </body>
</html>
