<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>iShot HUD</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: transparent !important;
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      }
      /* Frosted pill, macOS-HUD style. Fades in fast, fades out before the
         window is torn down by Rust. */
      .pill {
        max-width: 92%;
        padding: 11px 22px;
        border-radius: 22px;
        background: rgba(32, 32, 34, 0.82);
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
        color: rgba(255, 255, 255, 0.96);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.38), inset 0 0 0 0.5px rgba(255, 255, 255, 0.12);
        opacity: 0;
        transform: translateY(6px) scale(0.97);
        transition: opacity 180ms ease, transform 180ms ease;
      }
      .pill.show { opacity: 1; transform: translateY(0) scale(1); }
      .pill.hide { opacity: 0; transform: translateY(4px) scale(0.985); transition-duration: 280ms; }
    </style>
  </head>
  <body>
    <div class="pill" id="pill"></div>
    <script>
      const pill = document.getElementById("pill");
      const text = new URLSearchParams(location.search).get("text") || "";
      pill.textContent = text;
      requestAnimationFrame(() => requestAnimationFrame(() => pill.classList.add("show")));
      // Fade out just before Rust closes the window (~2s).
      setTimeout(() => pill.classList.replace("show", "hide"), 1550);
    </script>
  </body>
</html>
