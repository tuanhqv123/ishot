<!--
  iShot app icon — outline daisy on solid-black squircle.
  No outer border; the daisy is pure white outline. Black-fills the petal
  interior so the shape reads as outline-only against the black ground.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Solid black squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#000000"/>

  <!-- 8 daisy petals: white outline, black fill so interior reads as "hollow" -->
  <g fill="#000000" stroke="#ffffff" stroke-width="36" stroke-linejoin="round">
    <g transform="rotate(0 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(45 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(90 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(135 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(180 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(225 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(270 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
    <g transform="rotate(315 512 512)"><ellipse cx="512" cy="344" rx="68" ry="148"/></g>
  </g>

  <!-- Pistil: solid white dot -->
  <circle cx="512" cy="512" r="68" fill="#ffffff"/>
</svg>
