<!--
  iShot menu-bar (tray) icon — pure black daisy, transparent background.
  Rendered as macOS template image (NSImage isTemplate=true) so the system
  auto-tints it white in dark menubars and black in light menubars.

  Geometry tuned for ~22pt rendering: thicker strokes, no outer border (saves
  pixels). Same 8-petal layout as the app icon for brand consistency.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g fill="none" stroke="#000000" stroke-width="3.6" stroke-linejoin="round">
    <g transform="rotate(0 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(45 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(90 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(135 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(180 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(225 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(270 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
    <g transform="rotate(315 32 32)"><ellipse cx="32" cy="14" rx="5.2" ry="10.6"/></g>
  </g>
  <circle cx="32" cy="32" r="5.2" fill="#000000"/>
</svg>
