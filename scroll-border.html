<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        background: transparent !important;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .border {
        width: 100%;
        height: 100%;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(0,0,0,0.1);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="border"></div>
  </body>
</html>
